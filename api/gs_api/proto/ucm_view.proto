syntax = "proto3";

// ucm_view.proto — the SUBSET of services/com's supervisor_bridge.proto that GS
// needs to drive + observe the on-device UCM agent over com gRPC (the ara::com
// OTA-client edge). Kept in sync with the UcmView block in
// theia/services/com/proto/supervisor_bridge.proto — same field numbers + the
// SAME package `services.com` (so the wire service name matches com's server).
//
// GS is the OTA CLIENT in the ARA model: it lands bits via Mender, then drives
// UCM's lifecycle (verify → SM-session → stop → install → activate → restart →
// PHM-verify → ACTIVE/ROLLBACK) and watches the FSM via GetProgress.
package services.com;

message UcmRequestUpdateCall {
    string name          = 1;   // "theia" (full) or an FC name (partial)
    string version       = 2;
    uint32 kind          = 3;   // 0=SOFTWARE 1=CONFIG
    uint32 scope         = 4;   // 0=FULL 1=PARTIAL
    string artifact_path = 5;
    string signature     = 6;
}
message UcmRequestUpdateReply {
    uint32 status = 1;          // 0=accepted 1=reject 2=not-ready
}
message UcmProgressReply {
    uint32 state   = 1;         // UcmState: 0 IDLE..7 ACTIVE, 8 ROLLBACK
    string version = 2;
    uint32 kind    = 3;
    uint32 scope   = 4;
    string detail  = 5;
    uint64 ts_ns   = 6;
    bool   ok      = 7;
    // The SM-session plane (system_services_sm.SmState: 2 RUNNING, 4 UPDATE, ...).
    uint32 sm_state = 8;
    uint64 sm_ts_ns = 9;
    bool   sm_ok    = 10;
}
message UcmProgressCall { }

service UcmView {
    rpc RequestUpdate (UcmRequestUpdateCall) returns (UcmRequestUpdateReply);
    rpc GetProgress (UcmProgressCall) returns (UcmProgressReply);
}

// ---- L4-B: VucmView — the VEHICLE campaign (V-UCM on the coordinator board) --
// In sync with the VucmView block in supervisor_bridge.proto. UcmView drives ONE
// board; VucmView drives the campaign: V-UCM fans the package to every board's
// UCM, holds CMP_CONFIRMING until ALL are PROVISIONAL (shared-etcd markers), then
// fans the aggregate Confirm. GS drives the CAMPAIGN here.
message VucmCampaignCall {
    string campaign_id = 1;
    string version     = 2;
    uint32 scope       = 3;   // 0=FULL 1=PARTIAL
}
message VucmCampaignReply {
    uint32 accepted = 1;      // 1 = queued
    uint32 state    = 2;      // CampaignState ordinal (wire)
}
message VucmStatusCall { }
message VucmStatusReply {
    uint32 state       = 1;   // CampaignState: 0 IDLE..7 CONFIRMING, 8 AWAITING_COMMIT
    string campaign_id = 2;
    string version     = 3;
    string detail      = 4;
    uint64 ts_ns       = 5;
    bool   valid       = 6;
}
message VucmDecisionCall  { string campaign_id = 1; bool rollback = 2; }
message VucmDecisionReply { uint32 accepted = 1; uint32 state = 2; }

service VucmView {
    rpc CheckForCampaign (VucmCampaignCall) returns (VucmCampaignReply);
    rpc GetCampaignStatus (VucmStatusCall) returns (VucmStatusReply);
    rpc Decide (VucmDecisionCall) returns (VucmDecisionReply);
}
