# theia local override for the OSS mender-server compose. Drop alongside the
# cloned mender-server's docker-compose.yml (up.sh copies it in).
#
# WHY: on a host running Docker >= 25 (dalek runs 29), the daemon enforces a
# minimum Engine API version of 1.44. Traefik v3.1's Docker provider negotiates at
# 1.24 and is rejected → traefik discovers ZERO routes via Docker labels → every
# /api path 404s. We bump traefik to v3.3 and point its Docker provider at a
# socket-proxy; the actual routing is then driven by the STATIC file provider
# (theia-routes.yaml) so it does not depend on Docker-label discovery at all.
services:
  dockerproxy:
    image: tecnativa/docker-socket-proxy:latest
    environment:
      - CONTAINERS=1
      - NETWORKS=1
      - SERVICES=1
      - TASKS=1
      - INFO=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - default
  traefik:
    image: traefik:v3.3
    command:
      - --api=true
      - --api.insecure=true
      - --accesslog=true
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls=true
      - --entrypoints.websecure.asDefault=true
      - --providers.file.directory=/etc/traefik/config
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --providers.docker.endpoint=tcp://dockerproxy:2375
    depends_on:
      - dockerproxy

  # ── Trim: disable the services the Theia OTA wire never touches ──────────────
  # Our flow uses exactly 4 API surfaces — useradm (login/PAT), deviceauth
  # (enroll/accept), inventory (device groups), deployments (upload/deploy/status)
  # — plus their datastore (mongo), bus (nats), artifact store (s3/seaweedfs) and
  # gateway (traefik). The services below are NOT on that path: the web GUI (we
  # drive the API), device-config / remote-terminal (deviceconfig, deviceconnect),
  # and the IoT-hub integration. `scale: 0` keeps them defined (so traefik's static
  # routes still resolve) but never starts OR PULLS them — ~150MB + 4 containers
  # of RAM/CPU saved per run. (The qemu `client` is already scale:0 upstream — its
  # 1.3GB image is never pulled.) Re-enable any with `docker compose up --scale gui=1`.
  gui:           { scale: 0 }
  deviceconfig:  { scale: 0 }
  deviceconnect: { scale: 0 }
  iot-manager:   { scale: 0 }
